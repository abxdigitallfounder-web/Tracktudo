# Blueprint do Render para o TRACKTUDO.
# Sobe UM web service que compila o frontend + backend e serve tudo junto.
# Os valores marcados com `sync: false` você preenche no painel do Render
# (nunca ficam no repositório).
services:
  - type: web
    name: tracktudo
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: META_API_VERSION
        value: v25.0
      # Segredo do cookie de sessão — o Render gera um valor aleatório seguro.
      - key: SESSION_SECRET
        generateValue: true
      # >>> Preencher no painel do Render (Environment) <<<
      - key: APP_PASSWORD
        sync: false
      - key: META_SYSTEM_USER_TOKEN
        sync: false
      - key: META_TOKENS
        sync: false
      # Connection string do Postgres (Neon/Supabase). Use a URL do host -pooler.
      - key: DATABASE_URL
        sync: false
      # Token de segurança do webhook de vendas da PerfectPay.
      - key: PERFECTPAY_WEBHOOK_TOKEN
        sync: false
      # Token Pessoal da API PerfectPay (JWT) — puxa o histórico de vendas.
      - key: PERFECTPAY_API_TOKEN
        sync: false
